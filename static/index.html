<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>concept-atlas</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <aside id="panel">
    <header>
      <h1>concept-atlas</h1>
      <p class="tagline">The knowledge graph <em>of</em> the model, not <em>for</em> it.</p>
      <p class="model" id="model-name"></p>
    </header>

    <section class="control">
      <label for="weight-filter">min |edge weight| <span id="weight-value">0.00</span></label>
      <input type="range" id="weight-filter" min="0" max="0.5" step="0.01" value="0">
    </section>

    <section class="control">
      <span class="label">concept sets</span>
      <div id="group-toggles"></div>
    </section>

    <section class="control legend">
      <span class="label">edges</span>
      <div><span class="swatch excitatory"></span> excitatory (w &gt; 0)</div>
      <div><span class="swatch inhibitory"></span> inhibitory (w &lt; 0)</div>
      <span class="label">nodes</span>
      <div>radius &prop; probe accuracy</div>
      <div>hover for layer &amp; accuracy</div>
    </section>

    <footer>
      <p><code>graph.json</code> is measured from Llama-3.1-8B; regenerate with <code>experiments/make_graph.py</code>.</p>
    </footer>
  </aside>

  <main id="stage">
    <svg id="graph"></svg>
    <div id="tooltip" hidden></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="app.js"></script>
</body>
</html>
